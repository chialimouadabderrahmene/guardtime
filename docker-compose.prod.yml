# GuardTime — single-VPS production stack (Ubuntu 24.04 + Docker Compose).
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Core services (always on): postgres, redis, backend, dns-service, nginx.
# Optional (profile-gated, off by default):
#   --profile monitoring   -> prometheus, grafana
#   --profile gateway-agent -> the Software Gateway container (see that
#                              service's own comment for why it's optional
#                              and how it differs from the real production
#                              path, the systemd unit).
#
# Everything reads its secrets from .env.prod (copy .env.prod.example ->
# .env.prod, fill in real values, keep it out of git — it already is, via
# the root .gitignore's `.env*` rule). Nothing sensitive is hardcoded below.

networks:
  guardtime_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
  prometheus_data:
  grafana_data:

# Shared logging policy: bounded json-file logs on every service so a
# runaway process can never fill the disk — `docker compose logs` still
# works normally against these.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security-hardened: &security-hardened
  security_opt:
    - no-new-privileges:true

services:
  # ───────────────────────── PostgreSQL ─────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *security-hardened
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardtime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-parental_control}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - guardtime_internal
    # No published port — only reachable from other containers on
    # guardtime_internal. Nothing outside this host can reach Postgres.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guardtime}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 1G }
        reservations: { cpus: '0.25', memory: 256M }

  # ─────────────────────────── Redis ────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *security-hardened
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod}
      --appendonly yes
      --maxmemory 200mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - guardtime_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }
        reservations: { cpus: '0.1', memory: 64M }

  # ────────────────────────── Backend ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *security-hardened
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: ["ALL"]
    volumes:
      # Optional — see secrets/README.md. Directory mount (not a single
      # file) deliberately, so it stays a no-op if you never put anything
      # in it: Docker create-empty-directory-if-missing semantics for a
      # single-file bind mount is a well-known footgun that a directory
      # mount avoids.
      - ./secrets:/opt/guardtime/secrets:ro
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-guardtime}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-parental_control}?schema=public&connection_limit=10&pool_timeout=10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      PORT: 3000
    networks:
      - guardtime_internal
    # No published port — Nginx is the only public entry point (proxies to
    # backend:3000 over guardtime_internal). Reach it directly for local
    # debugging with `docker compose exec backend curl localhost:3000/health`.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 3s
      start_period: 25s
      retries: 3
    restart: unless-stopped
    # Docker's default 10s SIGTERM grace period is tight for draining
    # in-flight BullMQ jobs + Prisma connections (see main.ts's
    # app.enableShutdownHooks()) — give it real room before SIGKILL.
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '1.5', memory: 768M }
        reservations: { cpus: '0.25', memory: 256M }

  # ───────────────────────── DNS Service ────────────────────────
  dns-service:
    build:
      context: ./dns-service
      dockerfile: Dockerfile
    <<: *security-hardened
    read_only: true
    tmpfs:
      - /tmp
    # NET_BIND_SERVICE is required even though the image already grants it
    # via setcap on the node binary (see dns-service/Dockerfile) — a file
    # capability only takes effect if it's also present in the container's
    # own bounding set, which cap_drop: ALL would otherwise remove.
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    env_file: .env.prod
    environment:
      BACKEND_URL: http://backend:3000
      HEALTH_PORT: 8080
      DNS_PORT: 53
    ports:
      # Port 53 is the actual product surface — home routers point at this
      # VPS's public IP as their DNS resolver, so it must be reachable.
      - "53:53/udp"
      - "53:53/tcp"
    networks:
      - guardtime_internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }
        reservations: { cpus: '0.1', memory: 64M }

  # ──────────────────── Gateway Agent (OPTIONAL) ────────────────
  # Software Gateway container path — off by default (`--profile gateway-agent`
  # to enable). The recommended, fully-capable production path is the
  # bare-metal systemd unit (gateway-agent/deploy/guardtime-gateway-agent.service),
  # which runs as root with unrestricted iptables/nftables/conntrack access
  # to the real LAN — something a container fundamentally can't replicate
  # without giving up the isolation containers exist for. This service is
  # here because docker-compose was asked for as the deployment mechanism
  # and because Software Gateway is a supported (if experimental) option —
  # not because it's the recommended way to run gateway-agent.
  gateway-agent:
    build:
      context: ./gateway-agent
      dockerfile: Dockerfile
    profiles: ["gateway-agent"]
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file: .env.prod
    environment:
      BACKEND_URL: ${GATEWAY_AGENT_BACKEND_URL:-https://your-domain.example}
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?Register a gateway in the app first, then set GATEWAY_TOKEN}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  # ──────────────────────────── Nginx ───────────────────────────
  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    <<: *security-hardened
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop: ["ALL"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
      - ./nginx/certbot-www:/var/www/certbot:ro
    ports:
      - "80:8080"
      - "443:8443"
    networks:
      - guardtime_internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 20s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 128M }

  # ────────────────── Monitoring (OPTIONAL) ─────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    volumes:
      - ./backend/deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - guardtime_internal
    # Loopback only — reach it via `ssh -L 9090:localhost:9090` rather than
    # exposing it publicly.
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }

  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env.prod}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3300}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/deploy/grafana/guardtime-fleet-dashboard.json:/etc/grafana/provisioning/dashboards/guardtime-fleet-dashboard.json:ro
    networks:
      - guardtime_internal
    ports:
      - "127.0.0.1:3300:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }
