# GuardTime production reverse proxy — adapted from the pre-existing
# backend/deploy/nginx/guardtime.conf for the docker-compose.prod.yml
# topology: proxy_pass targets use the compose service name (backend:3000)
# instead of 127.0.0.1:3000 (that file assumed bare-metal co-location), and
# listen ports are 8080/8443 to match the nginxinc/nginx-unprivileged base
# image (compose maps host 80/443 -> container 8080/8443).
#
# Fill in before first deploy:
#   <API_DOMAIN>     e.g. api.your-domain.example (matches .env.prod's API_DOMAIN)
#   <INTERNAL_CIDR>  127.0.0.1/32 is correct for this single-VPS topology —
#                    every internal caller (Prometheus, dns-service) is a
#                    container on the same Docker host.
# Certificates are read from /etc/nginx/certs/{fullchain,privkey}.pem —
# bind-mounted read-only from ./nginx/certs on the host (see DEPLOYMENT.md's
# SSL section for how certbot populates that directory).

# --- Rate limiting zones (edge-level, in front of the app's own Throttler) ---
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# --- gzip ---
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 512;
gzip_types application/json application/javascript text/css text/plain application/xml image/svg+xml;

# --- WebSocket upgrade support (no WS route exists yet — this just means
# one never requires an nginx.conf change to add later) ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- Plain HTTP: ACME challenge + redirect everything else to HTTPS ---
server {
    listen 8080;
    listen [::]:8080;
    server_name <API_DOMAIN>;

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
# HTTP/3 (QUIC) is commented out by default: it requires nginx built with
# --with-http_v3_module, which nginxinc/nginx-unprivileged does not ship as
# of this writing. Uncomment the two `quic`/`Alt-Svc` lines only after
# confirming `nginx -V` lists http_v3_module in whatever image you switch to.
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    # listen 8443 quic reuseport;
    # listen [::]:8443 quic reuseport;
    http2 on;
    # http3 on;
    server_name <API_DOMAIN>;
    # add_header Alt-Svc 'h3=":443"; ma=86400' always;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # --- Security headers (defense in depth; helmet() sets most of these
    # app-side too — this covers static/error responses the app never sees) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    client_max_body_size 2m;
    limit_conn conn_limit 40;

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- Internal-only: Prometheus scrape target. Exposes route latency,
    # memory/CPU — must never be reachable from the public internet. ---
    location /metrics {
        allow <INTERNAL_CIDR>;
        deny all;
        proxy_pass http://backend:3000/metrics;
        proxy_set_header Host $host;
    }

    # --- Internal-only: called exclusively by the co-located DNS service on
    # every query. Public exposure = unauthenticated DoS surface (flagged in
    # the 2026-07-17 production-readiness audit — this closes it). In this
    # compose topology dns-service actually reaches backend directly over
    # guardtime_internal (BACKEND_URL=http://backend:3000), never through
    # nginx — these blocks stay as defense-in-depth in case that ever
    # changes or nginx is exposed on an interface dns-service also uses. ---
    location /dns/policy/check {
        allow <INTERNAL_CIDR>;
        deny all;
        proxy_pass http://backend:3000/dns/policy/check;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Internal-only: called exclusively by the co-located DNS service
    # when it resolves a `<token>.pair.guardtime.local` probe query (device
    # pairing + IP auto-repair beacon). Same trust boundary and rationale as
    # /dns/policy/check above — never expose publicly. ---
    location /dns/pair/confirm {
        allow <INTERNAL_CIDR>;
        deny all;
        proxy_pass http://backend:3000/dns/pair/confirm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Auth endpoints: tighter edge rate limit ahead of the app's own
    # per-route Throttler (5/min login, 10/min register) ---
    location ~ ^/auth/(login|register) {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # --- Everything else ---
    location / {
        limit_req zone=api_general burst=40 nodelay;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;

        # WebSocket upgrade passthrough (no-op today, ready if a WS route
        # is ever added — see the `map` block near the top of this file).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
